<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" width="820" height="340" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000018"/>
    </filter>
    <linearGradient id="grad-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FC4A1A;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B61FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5B3FD9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ECC71;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#27AE60;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad-teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1ABC9C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16A085;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2176AE;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="820" height="340" rx="16" fill="#F8F9FC" stroke="#E2E6F0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="410" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#3D3D3D" letter-spacing="0.5">GitLab CI/CD 自動部署流程</text>

  <!-- ══ NODES ══ -->

  <!-- GitLab Server -->
  <g filter="url(#shadow)">
    <rect x="590" y="68" width="180" height="72" rx="12" fill="url(#grad-orange)"/>
  </g>
  <text x="680" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="white">GitLab Server</text>
  <text x="680" y="117" text-anchor="middle" font-size="11" fill="#FFE0D0">接收 push，派發任務</text>

  <!-- GitLab Runner -->
  <g filter="url(#shadow)">
    <rect x="50" y="68" width="180" height="72" rx="12" fill="url(#grad-purple)"/>
  </g>
  <text x="140" y="94" text-anchor="middle" font-size="13" font-weight="700" fill="white">GitLab Runner</text>
  <text x="140" y="111" text-anchor="middle" font-size="11" fill="#DDD8FF">安裝在 VM / 伺服器上</text>
  <text x="140" y="128" text-anchor="middle" font-size="11" fill="#DDD8FF">執行 .gitlab-ci.yml</text>

  <!-- Step 1: git pull -->
  <g filter="url(#shadow)">
    <rect x="50" y="220" width="155" height="68" rx="12" fill="url(#grad-green)"/>
  </g>
  <text x="128" y="247" text-anchor="middle" font-size="12" font-weight="700" fill="white">git pull</text>
  <text x="128" y="265" text-anchor="middle" font-size="11" fill="#D0F5E5">同步最新程式碼</text>
  <text x="128" y="280" text-anchor="middle" font-size="10" fill="#D0F5E5">從 GitLab 拉取</text>

  <!-- Step 2: 重啟服務 -->
  <g filter="url(#shadow)">
    <rect x="253" y="220" width="155" height="68" rx="12" fill="url(#grad-teal)"/>
  </g>
  <text x="330" y="247" text-anchor="middle" font-size="12" font-weight="700" fill="white">重啟服務</text>
  <text x="330" y="265" text-anchor="middle" font-size="11" fill="#CCF5EE">停止舊進程</text>
  <text x="330" y="280" text-anchor="middle" font-size="10" fill="#CCF5EE">啟動新版本</text>

  <!-- Step 3: 回報結果 -->
  <g filter="url(#shadow)">
    <rect x="456" y="220" width="155" height="68" rx="12" fill="url(#grad-blue)"/>
  </g>
  <text x="534" y="247" text-anchor="middle" font-size="12" font-weight="700" fill="white">回報結果</text>
  <text x="534" y="265" text-anchor="middle" font-size="11" fill="#CCE5F5">回傳 exit code</text>
  <text x="534" y="280" text-anchor="middle" font-size="10" fill="#CCE5F5">Pipeline 標記成功/失敗</text>

  <!-- ══ ARROWS ══ -->

  <!-- GitLab Server → GitLab Runner (top, right to left) -->
  <line x1="590" y1="104" x2="234" y2="104" stroke="#555" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="0"/>
  <rect x="358" y="82" width="116" height="22" rx="6" fill="#FFF3CD" stroke="#F0C040" stroke-width="1"/>
  <text x="416" y="97" text-anchor="middle" font-size="11" fill="#7A5A00" font-weight="500">派發 Job</text>

  <!-- GitLab Runner → git pull (down) -->
  <line x1="140" y1="140" x2="128" y2="216" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- git pull → 重啟服務 -->
  <line x1="205" y1="254" x2="249" y2="254" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 重啟服務 → 回報結果 -->
  <line x1="408" y1="254" x2="452" y2="254" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 回報結果 → GitLab Server (right edge, L-shape) -->
  <path d="M 611 254 L 790 254 L 790 104 L 774 104" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="706" y="168" width="92" height="22" rx="6" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1"/>
  <text x="752" y="183" text-anchor="middle" font-size="11" fill="#2E7D32" font-weight="500">部署狀態回報</text>

  <!-- Step numbers -->
  <circle cx="50" cy="220" r="11" fill="#27AE60" stroke="white" stroke-width="2"/>
  <text x="50" y="224" text-anchor="middle" font-size="11" font-weight="700" fill="white">1</text>

  <circle cx="253" cy="220" r="11" fill="#16A085" stroke="white" stroke-width="2"/>
  <text x="253" y="224" text-anchor="middle" font-size="11" font-weight="700" fill="white">2</text>

  <circle cx="456" cy="220" r="11" fill="#2176AE" stroke="white" stroke-width="2"/>
  <text x="456" y="224" text-anchor="middle" font-size="11" font-weight="700" fill="white">3</text>

</svg>
